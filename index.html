<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Solar System Visualizer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        #ui-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(10, 10, 15, 0.45);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 280px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            z-index: 100;
            box-sizing: border-box;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s ease;
        }

        #ui-panel.collapsed {
            transform: translateX(310px);
            opacity: 0.3;
        }

        #panel-toggle {
            position: absolute;
            left: -45px;
            top: 15px;
            width: 35px;
            height: 35px;
            background: rgba(15, 15, 25, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #aaa;
            transition: all 0.3s;
        }

        #panel-toggle:hover {
            color: white;
            background: rgba(30, 30, 50, 0.9);
        }

        .search-container {
            position: relative;
            margin-bottom: 20px;
        }

        #planet-search {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 10px 15px;
            border-radius: 12px;
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.3s, background 0.3s;
        }

        #planet-search:focus {
            border-color: #007bff;
            background: rgba(255, 255, 255, 0.1);
        }

        .search-results {
            position: absolute;
            top: 45px;
            left: 0;
            width: 100%;
            background: rgba(10, 10, 20, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            overflow: hidden;
            z-index: 1000;
            display: none;
        }

        .search-result-item {
            padding: 10px 15px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
        }

        .search-result-item:hover {
            background: rgba(0, 123, 255, 0.3);
        }

        h2 {
            display: none;
            /* Minimalist: hide title */
        }

        .control-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 4px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="range"] {
            width: 100%;
            accent-color: #007bff;
            cursor: pointer;
            height: 4px;
        }

        select {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            color: #ccc;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px;
            border-radius: 10px;
            font-size: 0.85rem;
            outline: none;
        }

        button#tour-btn {
            background: #007bff;
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
            margin-top: 15px;
        }

        button:hover {
            background: linear-gradient(135deg, #0056b3, #004085);
            box-shadow: 0 6px 20px rgba(0, 123, 255, 0.6);
            transform: translateY(-1px);
        }

        .planet-label {
            position: absolute;
            color: rgba(255, 255, 255, 0.9);
            font-size: 12px;
            font-weight: 500;
            pointer-events: none;
            text-shadow: 0px 0px 4px #000, 0px 0px 2px #000;
            transform: translate(-50%, -50%);
            transition: opacity 0.2s ease;
            z-index: 10;
            letter-spacing: 0.5px;
        }

        .planet-label.hidden {
            opacity: 0;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 2px;
            z-index: 200;
            transition: opacity 0.5s;
        }

        #tour-info {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            z-index: 1000;
            text-transform: uppercase;
        }

        #tour-info h1 {
            font-size: 3.5rem;
            margin: 0;
            text-shadow: 0 0 25px rgba(255, 255, 255, 0.6), 0 4px 10px rgba(0, 0, 0, 0.8);
            letter-spacing: 8px;
            font-weight: 300;
            transition: opacity 0.4s ease-in-out;
        }

        #tour-info #tour-planet-stats {
            font-size: 1.1rem;
            color: #aaeebb;
            margin-top: 5px;
            letter-spacing: 4px;
            font-weight: 400;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
            transition: opacity 0.4s ease-in-out;
            font-family: 'Segoe UI', sans-serif;
            opacity: 0.8;
        }

        #tour-info p.tour-subtitle {
            font-size: 0.8rem;
            color: #88ddff;
            margin-top: 15px;
            letter-spacing: 4px;
            font-weight: 600;
            opacity: 0.6;
            text-transform: uppercase;
        }

        @media (max-width: 600px) {
            #ui-panel {
                top: auto;
                bottom: 20px;
                right: 50%;
                transform: translateX(50%) !important;
                width: 90%;
                padding: 15px;
            }

            #tour-info {
                bottom: 120px;
                /* Above the panel */
            }

            #tour-info h1 {
                font-size: 2rem;
            }
        }

        /* --- Details Panel --- */
        #details-overlay {
            position: absolute;
            bottom: 30px;
            right: 20px;
            width: 320px;
            background: rgba(5, 5, 10, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 25px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            z-index: 90;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            pointer-events: none;
        }

        #details-overlay.active {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: all;
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .detail-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .detail-label {
            font-size: 0.65rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 0.85rem;
            color: #eee;
            font-weight: 500;
        }

        .details-title {
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #fff;
        }

        .details-desc {
            font-size: 0.8rem;
            color: #aaa;
            line-height: 1.4;
            margin-bottom: 15px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>

<body>
    <div id="loading">INITIALIZING UNIVERSE...</div>
    <div id="canvas-container"></div>
    <div id="labels-container"></div>

    <div id="details-overlay">
        <div class="details-title" id="det-name">Earth</div>
        <div class="details-desc" id="det-desc">Our home planet, the only known world with life.</div>
        <div class="details-grid">
            <div class="detail-item">
                <div class="detail-label">Distance from Sun</div>
                <div class="detail-value" id="det-dist">1.00 AU</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">Orbital Period</div>
                <div class="detail-value" id="det-orbit">365 Days</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">Surface Temp</div>
                <div class="detail-value" id="det-temp">15°C</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">Mass (Relative)</div>
                <div class="detail-value" id="det-mass">1.0 Earths</div>
            </div>
            <div class="detail-item" style="grid-column: span 2">
                <div class="detail-label">Atmosphere</div>
                <div class="detail-value" id="det-atmos">Nitrogen, Oxygen</div>
            </div>
        </div>
    </div>

    <!-- Tour HUD -->
    <div id="tour-info">
        <p class="tour-subtitle">Approaching Target...</p>
        <h1 id="tour-planet-name">SYSTEM READY</h1>
        <p id="tour-planet-stats"></p>
    </div>

    <div id="audio-toggle" style="position: absolute; bottom: 20px; left: 20px; z-index: 100; cursor: pointer; opacity: 0.6; transition: opacity 0.3s; display: flex; align-items: center; gap: 8px;">
        <div id="audio-icon" style="width: 24px; height: 24px; border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px;">🔇</div>
        <span style="font-size: 10px; text-transform: uppercase; letter-spacing: 2px;">Space Ambience</span>
    </div>

    <div id="ui-panel">
        <div class="search-container">
            <input type="text" id="planet-search" placeholder="Search a planet..." autocomplete="off">
            <div id="search-results" class="search-results"></div>
        </div>

        <div class="control-group">
            <label>Speed <span id="speed-val" style="float:right">1.0x</span></label>
            <input type="range" id="speed" min="0" max="10" step="0.1" value="1">
        </div>

        <div class="control-group" style="display:flex; justify-content:space-between">
            <label class="checkbox-label" style="font-size:0.7rem">
                <input type="checkbox" id="toggle-orbits" checked> Orbit
            </label>
            <label class="checkbox-label" style="font-size:0.7rem">
                <input type="checkbox" id="toggle-labels" checked> Label
            </label>
        </div>

        <div class="control-group">
            <select id="scale-mode">
                <option value="visual">Visual Mode</option>
                <option value="realistic">Realistic Mode</option>
            </select>
        </div>

        <button id="tour-btn">Cinematic Tour</button>
        <div id="panel-toggle">›</div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
        import { Lensflare, LensflareElement } from 'https://unpkg.com/three@0.160.0/examples/jsm/objects/Lensflare.js';
        import { EffectComposer } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/EffectComposer.js';
        import { RenderPass } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'https://unpkg.com/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js';

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const labelsContainer = document.getElementById('labels-container');

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000);
        camera.position.set(0, 120, 180);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance", alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        container.appendChild(renderer.domElement);

        // --- Post-Processing ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.15;
        bloomPass.strength = 1.5; // Make the sun and atmospheres glow realistically
        bloomPass.radius = 0.8;

        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 1000;
        controls.minDistance = 5;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.03); // Realistic dark space
        scene.add(ambientLight);

        const sunLight = new THREE.PointLight(0xfff5e6, 6, 2000, 0.1); // Warmer, brighter sun
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 4096; // Higher res shadows
        sunLight.shadow.mapSize.height = 4096;
        sunLight.shadow.camera.near = 5;
        sunLight.shadow.camera.far = 500;
        sunLight.shadow.bias = -0.0005;
        scene.add(sunLight);

        // Lens Flare
        const textureLoader = new THREE.TextureLoader();
        const textureFlare0 = textureLoader.load('https://threejs.org/examples/textures/lensflare/lensflare0.png');
        const textureFlare3 = textureLoader.load('https://threejs.org/examples/textures/lensflare/lensflare3.png');

        const lensflare = new Lensflare();
        lensflare.addElement(new LensflareElement(textureFlare0, 500, 0, sunLight.color));
        lensflare.addElement(new LensflareElement(textureFlare3, 60, 0.6));
        lensflare.addElement(new LensflareElement(textureFlare3, 70, 0.7));
        lensflare.addElement(new LensflareElement(textureFlare3, 120, 0.9));
        lensflare.addElement(new LensflareElement(textureFlare3, 70, 1));
        sunLight.add(lensflare);

        // --- Celestial Bodies ---

        // 1. The Sun
        const sunGeo = new THREE.SphereGeometry(8, 64, 64);
        const sunTex = generateSunTexture();
        const sunMat = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                sunTexture: { value: sunTex }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform float time;
                uniform sampler2D sunTexture;
                varying vec2 vUv;
                
                float random(vec2 st) { return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123); }
                float noise(vec2 st) {
                    vec2 i = floor(st); vec2 f = fract(st);
                    float a = random(i); float b = random(i + vec2(1.0, 0.0));
                    float c = random(i + vec2(0.0, 1.0)); float d = random(i + vec2(1.0, 1.0));
                    vec2 u = f * f * (3.0 - 2.0 * f);
                    return mix(a, b, u.x) + (c - a)* u.y * (1.0 - u.x) + (d - b) * u.x * u.y;
                }
                float fbm(vec2 st) {
                    float v = 0.0; float a = 0.5; vec2 shift = vec2(100.0);
                    mat2 rot = mat2(cos(0.5), sin(0.5), -sin(0.5), cos(0.50));
                    for (int i = 0; i < 6; ++i) {
                        v += a * noise(st); st = rot * st * 2.0 + shift; a *= 0.5;
                    }
                    return v;
                }
                
                void main() {
                    vec2 uv = vUv;
                    float n = fbm(uv * 10.0 + time * 0.05);
                    uv += n * 0.05;
                    
                    vec4 texColor = texture2D(sunTexture, uv);
                    float bright = pow(n, 2.5) * 2.0;
                    
                    gl_FragColor = vec4(texColor.rgb + bright * vec3(1.0, 0.4, 0.1), 1.0) * 1.8;
                }
            `
        });
        const sun = new THREE.Mesh(sunGeo, sunMat);
        scene.add(sun);

        // Sun Glow Effect (Enhanced with Custom Shader)
        const coronaGeo = new THREE.SphereGeometry(9.5, 64, 64);
        const coronaMat = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                color: { value: new THREE.Color(0xffaa00) }
            },
            vertexShader: `
                varying vec3 vNormal;
                void main() {
                    vNormal = normalize(normalMatrix * normal);
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying vec3 vNormal;
                uniform vec3 color;
                uniform float time;
                void main() {
                    float intensity = pow(0.65 - dot(vNormal, vec3(0, 0, 1.0)), 3.0);
                    float pulse = 0.8 + 0.2 * sin(time * 2.0);
                    gl_FragColor = vec4(color, 1.0) * intensity * pulse;
                }
            `,
            blending: THREE.AdditiveBlending,
            side: THREE.BackSide,
            transparent: true,
            depthWrite: false
        });
        const sunGlow = new THREE.Mesh(coronaGeo, coronaMat);
        sun.add(sunGlow);

        const coronaGeo2 = new THREE.SphereGeometry(14, 64, 64);
        const coronaMat2 = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                color: { value: new THREE.Color(0xff4400) }
            },
            vertexShader: `
                varying vec3 vNormal;
                void main() {
                    vNormal = normalize(normalMatrix * normal);
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying vec3 vNormal;
                uniform vec3 color;
                uniform float time;
                void main() {
                    float intensity = pow(0.55 - dot(vNormal, vec3(0, 0, 1.0)), 4.0);
                    float pulse = 0.8 + 0.2 * cos(time * 1.5);
                    gl_FragColor = vec4(color, 1.0) * intensity * pulse;
                }
            `,
            blending: THREE.AdditiveBlending,
            side: THREE.BackSide,
            transparent: true,
            depthWrite: false
        });
        const sunGlow2 = new THREE.Mesh(coronaGeo2, coronaMat2);
        sun.add(sunGlow2);

        function generateSunTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#ffaa00';
            ctx.fillRect(0, 0, 1024, 512);

            for (let i = 0; i < 5000; i++) {
                const x = Math.random() * 1024;
                const y = Math.random() * 512;
                const r = Math.random() * 5 + 1;

                const isDark = Math.random() > 0.8;
                ctx.fillStyle = isDark ? '#cc4400' : '#ffcc00';
                ctx.globalAlpha = Math.random() * 0.3;

                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();
            }

            for (let i = 0; i < 50; i++) {
                const x = Math.random() * 1024;
                const y = Math.random() * 512;
                const r = Math.random() * 40 + 10;

                ctx.fillStyle = '#ffffff';
                ctx.globalAlpha = 0.1;

                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();
            }

            const tex = new THREE.CanvasTexture(canvas);
            tex.colorSpace = THREE.SRGBColorSpace;
            return tex;
        }

        // Texture Generators for Realism
        function generatePlanetTextures(type, baseColor, color2) {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');

            const bumpCanvas = document.createElement('canvas');
            bumpCanvas.width = 1024;
            bumpCanvas.height = 512;
            const bumpCtx = bumpCanvas.getContext('2d');

            ctx.fillStyle = baseColor;
            ctx.fillRect(0, 0, 1024, 512);

            bumpCtx.fillStyle = '#888888'; // Neutral bump
            bumpCtx.fillRect(0, 0, 1024, 512);

            if (type === 'gas') {
                for (let y = 0; y < 512; y++) {
                    for (let x = 0; x < 1024; x += 4) {
                        // Domain warping for turbulent bands
                        const warp = Math.sin(y * 0.05 + x * 0.01) * 20 + Math.cos(y * 0.1 - x * 0.02) * 10;
                        const band = Math.sin((y + warp) * 0.05) + Math.sin((y + warp) * 0.1) * 0.5;

                        ctx.fillStyle = band > 0 ? color2 : baseColor;
                        ctx.globalAlpha = Math.abs(band) * 0.3 + 0.1;
                        ctx.fillRect(x, y, 4, 2);
                    }
                }
                // Add storms (Great Red Spot style)
                for (let i = 0; i < 15; i++) {
                    const x = Math.random() * 1024;
                    const y = Math.random() * 512;
                    const rX = Math.random() * 30 + 10;
                    const rY = rX * (0.4 + Math.random() * 0.3);

                    const gradient = ctx.createRadialGradient(x, y, 0, x, y, rX);
                    gradient.addColorStop(0, color2);
                    gradient.addColorStop(1, 'transparent');

                    ctx.fillStyle = gradient;
                    ctx.globalAlpha = Math.random() * 0.6 + 0.2;
                    ctx.beginPath();
                    ctx.ellipse(x, y, rX, rY, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
            } else if (type === 'rocky' || type === 'mars') {
                // Base noise for rocky planets
                for (let y = 0; y < 512; y += 4) {
                    for (let x = 0; x < 1024; x += 4) {
                        const noise = Math.sin(x * 0.05) * Math.cos(y * 0.05) + Math.random() * 0.5;
                        ctx.fillStyle = noise > 0.5 ? color2 : baseColor;
                        ctx.globalAlpha = Math.abs(noise) * 0.4;
                        ctx.fillRect(x, y, 4, 4);

                        bumpCtx.fillStyle = noise > 0.5 ? '#888888' : '#444444';
                        bumpCtx.globalAlpha = Math.abs(noise) * 0.5;
                        bumpCtx.fillRect(x, y, 4, 4);
                    }
                }

                // Craters
                for (let i = 0; i < 5000; i++) {
                    const x = Math.random() * 1024;
                    const y = Math.random() * 512;
                    const r = Math.random() * 4 + 1;
                    const isCrater = Math.random() > 0.5;

                    ctx.fillStyle = isCrater ? color2 : '#000000';
                    ctx.globalAlpha = Math.random() * 0.3;
                    ctx.beginPath();
                    ctx.arc(x, y, r, 0, Math.PI * 2);
                    ctx.fill();

                    // Crater rim
                    bumpCtx.fillStyle = '#ffffff';
                    bumpCtx.globalAlpha = Math.random() * 0.4;
                    bumpCtx.beginPath();
                    bumpCtx.arc(x, y, r + 1, 0, Math.PI * 2);
                    bumpCtx.fill();

                    // Crater center
                    bumpCtx.fillStyle = '#000000';
                    bumpCtx.globalAlpha = Math.random() * 0.6;
                    bumpCtx.beginPath();
                    bumpCtx.arc(x, y, r, 0, Math.PI * 2);
                    bumpCtx.fill();
                }
            }

            const map = new THREE.CanvasTexture(canvas);
            map.colorSpace = THREE.SRGBColorSpace;
            const bumpMap = new THREE.CanvasTexture(bumpCanvas);

            return { map, bumpMap };
        }

        function generateCloudsTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, 1024, 512);

            ctx.fillStyle = '#ffffff';
            for (let i = 0; i < 5000; i++) {
                const x = Math.random() * 1024;
                const y = Math.random() * 512;
                const r = Math.random() * 15 + 2;
                ctx.globalAlpha = Math.random() * 0.2;
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();
            }

            // Weather swirls
            for (let i = 0; i < 40; i++) {
                const cx = Math.random() * 1024;
                const cy = Math.random() * 512;
                const radius = Math.random() * 120 + 30;

                for (let a = 0; a < Math.PI * 6; a += 0.1) {
                    const r = (a / (Math.PI * 6)) * radius;
                    const x = cx + Math.cos(a) * r;
                    const y = cy + Math.sin(a) * r;

                    ctx.globalAlpha = 0.1;
                    ctx.beginPath();
                    ctx.arc(x, y, Math.random() * 8 + 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            const tex = new THREE.CanvasTexture(canvas);
            tex.colorSpace = THREE.SRGBColorSpace;
            return tex;
        }

        function generateRingTexture(baseColorHex) {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 1;
            const ctx = canvas.getContext('2d');

            const color = new THREE.Color(baseColorHex);

            for (let i = 0; i < 1024; i++) {
                const t = i / 1024;
                let alpha = 0;
                let r = color.r, g = color.g, b = color.b;

                // Cassini Division
                if (t > 0.75 && t < 0.78) {
                    alpha = Math.random() * 0.05;
                }
                // Encke Gap
                else if (t > 0.88 && t < 0.89) {
                    alpha = Math.random() * 0.02;
                }
                // C Ring (Inner)
                else if (t > 0.1 && t < 0.3) {
                    alpha = Math.random() * 0.2 + 0.1;
                    r *= 0.7; g *= 0.7; b *= 0.7;
                }
                // B Ring (Brightest)
                else if (t >= 0.3 && t <= 0.75) {
                    alpha = 0.6 + Math.random() * 0.4;
                    // Add fine ringlets
                    if (Math.random() > 0.8) alpha *= 0.8;
                    if (Math.random() > 0.95) alpha *= 0.5;
                }
                // A Ring (Outer)
                else if (t >= 0.78 && t <= 0.95) {
                    alpha = 0.4 + Math.random() * 0.3;
                    r *= 0.9; g *= 0.9; b *= 0.9;
                    if (Math.random() > 0.8) alpha *= 0.8;
                }
                // F Ring (Very thin outer)
                else if (t > 0.96 && t < 0.98) {
                    alpha = 0.2 + Math.random() * 0.2;
                }

                ctx.fillStyle = `rgba(${Math.floor(r * 255)}, ${Math.floor(g * 255)}, ${Math.floor(b * 255)}, ${alpha})`;
                ctx.fillRect(i, 0, 1, 1);
            }

            const tex = new THREE.CanvasTexture(canvas);
            tex.colorSpace = THREE.SRGBColorSpace;
            return tex;
        }

        function generateMilkyWayTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 2048;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, 2048, 1024);

            // Draw galactic plane
            for (let i = 0; i < 15000; i++) {
                const x = Math.random() * 2048;
                // Gaussian-like distribution around the center Y
                const yOffset = (Math.random() + Math.random() + Math.random() - 1.5) * 250;
                const y = 512 + yOffset;

                const r = Math.random() * 2.5 + 0.5;
                const opacity = Math.random() * 0.4 * (1.0 - Math.abs(yOffset) / 375);

                ctx.fillStyle = `rgba(200, 220, 255, ${opacity})`;
                if (Math.random() > 0.7) ctx.fillStyle = `rgba(255, 200, 150, ${opacity})`; // Dust
                if (Math.random() > 0.9) ctx.fillStyle = `rgba(150, 100, 50, ${opacity * 0.5})`; // Dark dust

                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.colorSpace = THREE.SRGBColorSpace;
            return tex;
        }

        function generateEarthTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');

            const roughCanvas = document.createElement('canvas');
            roughCanvas.width = 1024;
            roughCanvas.height = 512;
            const roughCtx = roughCanvas.getContext('2d');

            const bumpCanvas = document.createElement('canvas');
            bumpCanvas.width = 1024;
            bumpCanvas.height = 512;
            const bumpCtx = bumpCanvas.getContext('2d');

            const nightCanvas = document.createElement('canvas');
            nightCanvas.width = 1024;
            nightCanvas.height = 512;
            const nightCtx = nightCanvas.getContext('2d');
            nightCtx.fillStyle = '#000000';
            nightCtx.fillRect(0, 0, 1024, 512);

            // Fill oceans
            ctx.fillStyle = '#1a5b9c';
            ctx.fillRect(0, 0, 1024, 512);
            roughCtx.fillStyle = '#111111'; // Smooth water
            roughCtx.fillRect(0, 0, 1024, 512);
            bumpCtx.fillStyle = '#000000'; // Low bump for water
            bumpCtx.fillRect(0, 0, 1024, 512);

            // Improved continent Generation with multi-frequency noise
            const getNoise = (x, y) => {
                let n = 0;
                n += Math.sin(x * 0.015) * Math.cos(y * 0.015) * 1.0;
                n += Math.sin(x * 0.04 + y * 0.02) * 0.5;
                n += Math.cos(x * 0.08 - y * 0.04) * 0.25;
                n += (Math.random() - 0.5) * 0.1;
                return n;
            };

            for (let y = 0; y < 512; y += 1) {
                for (let x = 0; x < 1024; x += 1) {
                    let noise = getNoise(x, y);

                    if (noise > 0.0) { // Threshold for land
                        const latDist = Math.abs(y - 256);
                        const isIce = latDist > 185;
                        const isDesert = !isIce && noise < 0.2 && latDist < 100;
                        const isMountain = noise > 0.65;

                        if (isIce) {
                            ctx.fillStyle = '#ffffff';
                            roughCtx.fillStyle = '#666666';
                            bumpCtx.fillStyle = '#eeeeee';
                        } else if (isDesert) {
                            ctx.fillStyle = '#d2b48c';
                            roughCtx.fillStyle = '#bbbbbb';
                            bumpCtx.fillStyle = '#888888';
                        } else if (isMountain) {
                            ctx.fillStyle = '#5a5a5a';
                            roughCtx.fillStyle = '#444444';
                            bumpCtx.fillStyle = '#ffffff';
                        } else {
                            // Grassland
                            ctx.fillStyle = noise > 0.4 ? '#1a4a1a' : '#2d5a27';
                            roughCtx.fillStyle = '#999999';
                            bumpCtx.fillStyle = '#666666';
                        }

                        ctx.fillRect(x, y, 1, 1);
                        roughCtx.fillRect(x, y, 1, 1);
                        bumpCtx.fillRect(x, y, 1, 1);

                        // Night Lights
                        if (!isIce && noise < 0.5 && Math.random() > 0.99) {
                            nightCtx.fillStyle = '#ffcc88';
                            nightCtx.fillRect(x, y, 1, 1);
                        }
                    } else {
                        // Ocean
                        const depth = Math.abs(noise);
                        ctx.fillStyle = depth > 0.2 ? '#051b33' : '#1a5b9c';
                        ctx.fillRect(x, y, 1, 1);
                        roughCtx.fillStyle = '#050505'; // Smooth water
                        roughCtx.fillRect(x, y, 1, 1);
                    }
                }
            }

            // Add polar ice caps
            ctx.fillStyle = '#ffffff';
            ctx.globalAlpha = 0.9;
            ctx.fillRect(0, 0, 1024, 60);
            ctx.fillRect(0, 452, 1024, 60);

            roughCtx.fillStyle = '#888888';
            roughCtx.globalAlpha = 1.0;
            roughCtx.fillRect(0, 0, 1024, 60);
            roughCtx.fillRect(0, 452, 1024, 60);

            bumpCtx.fillStyle = '#cccccc';
            bumpCtx.globalAlpha = 1.0;
            bumpCtx.fillRect(0, 0, 1024, 60);
            bumpCtx.fillRect(0, 452, 1024, 60);

            const map = new THREE.CanvasTexture(canvas);
            map.colorSpace = THREE.SRGBColorSpace;
            const roughnessMap = new THREE.CanvasTexture(roughCanvas);
            const bumpMap = new THREE.CanvasTexture(bumpCanvas);
            const nightMap = new THREE.CanvasTexture(nightCanvas);
            nightMap.colorSpace = THREE.SRGBColorSpace;

            return { map, roughnessMap, bumpMap, nightMap };
        }

        const planets = [];

        // Reusable geometries and materials
        const sphereGeo = new THREE.SphereGeometry(1, 64, 64);

        planetData.forEach((data, index) => {

                cloudShadowMesh = new THREE.Mesh(sphereGeo, shadowMat);
                cloudShadowMesh.scale.setScalar(data.radius * 1.002);
                scene.add(cloudShadowMesh);

                const nightMat = new THREE.ShaderMaterial({
                    uniforms: {

                        varying vec2 vUv;
                        varying vec3 vNormal;
                        varying vec3 vWorldPosition;
                        void main() {
                            vUv = uv;
                            vec4 worldPosition = modelMatrix * vec4(position, 1.0);
                            vWorldPosition = worldPosition.xyz;
                            vNormal = normalize(normalMatrix * normal);
                            gl_Position = projectionMatrix * viewMatrix * worldPosition;

                        uniform sampler2D nightMap;
                        uniform vec3 sunPosition;
                        varying vec2 vUv;
                        varying vec3 vNormal;

                        void main() {
                            vec3 normal = normalize(vNormal);

                            // Calculate illumination

                            // Only show lights on the dark side

                        varying vec3 vNormal;

                            vec3 normal = normalize(vNormal);

                            // Edge glow (Fresnel)

                            vec3 worldNormal = normalize(vWorldPosition - planetPosition);
                            float sunIllumination = dot(worldNormal, sunDir);
                            
                            // Smooth transition for the day side
                            float daySide = smoothstep(-0.2, 0.2, sunIllumination);
                            
                            // Terminator line for sunset/sunrise scattering effect
                            float terminator = smoothstep(-0.2, 0.1, sunIllumination) - smoothstep(0.1, 0.4, sunIllumination);
                            vec3 sunsetColor = vec3(1.0, 0.5, 0.2); // Warm orange/red scattering

                    `,

                    moonPath.getPoint = function (t) {

                    };
                    const moonLineGeo = new THREE.BufferGeometry().setFromPoints(moonPath.getPoints(64));
                    const moonLineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.1 });
                    const moonOrbitLine = new THREE.Line(moonLineGeo, moonLineMat);

            // Elliptical Orbit Line with Glow Trail
            const path = new THREE.Curve();
            path.getPoint = function (t) {
                const angle = t * Math.PI * 2;
                const a = data.distance;
                const b = a * Math.sqrt(1 - data.e * data.e);
                const c = Math.sqrt(a * a - b * b); // Focus offset
                return new THREE.Vector3(a * Math.cos(angle) - c, 0, b * Math.sin(angle));
            };
            const numPoints = 128;
            const points = path.getPoints(numPoints);
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);

            const lineAngles = new Float32Array(numPoints + 1);
            for (let j = 0; j <= numPoints; j++) {
                lineAngles[j] = (j / numPoints) * Math.PI * 2;
            }
            lineGeo.setAttribute('angle', new THREE.BufferAttribute(lineAngles, 1));

            const lineMat = new THREE.ShaderMaterial({
                uniforms: {
                    color: { value: new THREE.Color(data.color) },

                        gl_FragColor = vec4(color, finalAlpha);

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            ambientGain.gain.setValueAtTime(0, audioCtx.currentTime);

            // Sub-bass drone
            const drone = audioCtx.createOscillator();
            drone.type = 'sine';

            const droneGain = audioCtx.createGain();

            drone.connect(droneGain);

                const osc = audioCtx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(200, audioCtx.currentTime);
                filter.Q.setValueAtTime(10, audioCtx.currentTime);

                const lfo = audioCtx.createOscillator();
                lfo.frequency.setValueAtTime(0.1, audioCtx.currentTime);
                const lfoGain = audioCtx.createGain();
                lfoGain.gain.setValueAtTime(100, audioCtx.currentTime);
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                lfo.start();

                const g = audioCtx.createGain();
                g.gain.setValueAtTime(gainVal, audioCtx.currentTime);

                osc.connect(filter);
                filter.connect(g);
                g.connect(ambientGain);
                osc.start();
            }

            createPad(110, 0.05); // A2
            createPad(164.81, 0.03); // E3
            createPad(220, 0.02); // A3

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            const time = clock.getElapsedTime();

            // Update Shaders
            if (sun.material.uniforms && sun.material.uniforms.time) {
                sun.material.uniforms.time.value = time;
            }
            if (sunGlow.material.uniforms) {
                sunGlow.material.uniforms.time.value = time;
                sunGlow2.material.uniforms.time.value = time;
            }
            if (starShaderMat.uniforms) {
                starShaderMat.uniforms.time.value = time;
            }

            // Update Comets
            comets.forEach(comet => {
                comet.angle += comet.speed * timeSpeed;
                const x = Math.cos(comet.angle) * comet.orbitRadius;
                const z = Math.sin(comet.angle) * comet.orbitRadius;
                const y = Math.sin(comet.angle) * comet.orbitRadius * Math.tan(comet.tilt);
                
                comet.group.position.set(x, y, z);
                
                const nextAngle = comet.angle + 0.01;
                const nx = Math.cos(nextAngle) * comet.orbitRadius;
                const nz = Math.sin(nextAngle) * comet.orbitRadius;
                const ny = Math.sin(nextAngle) * comet.orbitRadius * Math.tan(comet.tilt);
                const dir = new THREE.Vector3(nx-x, ny-y, nz-z).normalize();
                
                for(let i=0; i<200; i++) {
                    const factor = i * 0.5;
                    comet.tailPos[i*3] = -dir.x * factor;
                    comet.tailPos[i*3+1] = -dir.y * factor;
                    comet.tailPos[i*3+2] = -dir.z * factor;
                }
                comet.tail.geometry.attributes.position.needsUpdate = true;
            });

            // Update Planets
            planets.forEach((p, i) => {
                p.angle += p.speed * timeSpeed;
                if (p.orbitLineMat) {
                    p.orbitLineMat.uniforms.planetAngle.value = p.angle;
                }
                const a = p.distance;
                const b = a * Math.sqrt(1 - p.e * p.e);
                const c = Math.sqrt(a * a - b * b);

                const px = a * Math.cos(p.angle) - c;
                const pz = b * Math.sin(p.angle);
                const py = Math.sin(p.angle) * a * Math.sin(p.inclination * (Math.PI / 180));

                p.mesh.position.set(px, py, pz);
                p.mesh.rotation.y += p.rotSpeed * timeSpeed;

                if (p.cloudsMesh) {
                    p.cloudsMesh.position.copy(p.mesh.position);
                    p.cloudsMesh.rotation.y += 0.025 * timeSpeed;
                }
                if (p.nightLightsMesh) {
                    p.nightLightsMesh.position.copy(p.mesh.position);
                    p.nightLightsMesh.rotation.copy(p.mesh.rotation);
                    if (p.nightLightsMesh.material.uniforms.sunPosition) {
                        p.nightLightsMesh.material.uniforms.sunPosition.value.copy(sun.position).sub(p.mesh.position).normalize();
                    }
                }
                if (p.mesh.userData.atmos) {
                    p.mesh.userData.atmos.position.copy(p.mesh.position);
                    if (p.mesh.userData.atmos.material.uniforms.planetPosition) {
                        p.mesh.userData.atmos.material.uniforms.planetPosition.value.copy(p.mesh.position);
                    }
                }

                // Moon logic
                if (p.moonObjs) {
                    p.moonObjs.forEach(moon => {
                        moon.angle += moon.speed * timeSpeed;
                        const moonDist = isRealisticScale ? moon.distance * 0.2 : moon.distance;
                        moon.mesh.position.set(
                            px + Math.cos(moon.angle) * moonDist,
                            py + Math.sin(moon.angle) * moonDist * 0.1,
                            pz + Math.sin(moon.angle) * moonDist
                        );
                        moon.mesh.rotation.y += 0.02 * timeSpeed;
                        if (moon.orbitLine) {
                            moon.orbitLine.position.copy(p.mesh.position);
                            moon.orbitLine.scale.setScalar(isRealisticScale ? 0.2 : 1);
                        }
                    });
                }

                // Update HTML Labels
                if (showLabels) {
                    tempV.copy(p.mesh.position);
                    tempV.project(camera);
                    if (tempV.z < 1) {
                        const x = (tempV.x * 0.5 + 0.5) * window.innerWidth;
                        const y = (tempV.y * -0.5 + 0.5) * window.innerHeight;
                        labels[i].el.style.left = `${x}px`;
                        labels[i].el.style.top = `${y - (isRealisticScale ? 15 : 30)}px`;
                        labels[i].el.classList.remove('hidden');
                        const dist = camera.position.distanceTo(p.mesh.position);
                        const scale = Math.max(0.5, 1 - dist / 1000);
                        labels[i].el.style.transform = `translate(-50%, -50%) scale(${scale})`;
                    } else {
                        labels[i].el.classList.add('hidden');
                    }
                }
            });

            asteroidBelt.rotation.y += 0.0005 * timeSpeed;
            stars.rotation.y += 0.0001 * timeSpeed;

            // Tour Mode Camera Logic
            if (tourMode) {
                tourTimer += delta;
                if (tourTimer >= TOUR_DURATION) {
                    tourTimer = 0;
                    tourIndex = (tourIndex + 1) % planets.length;
                    showPlanetDetails(tourIndex);
                }
                const tp = planets[tourIndex];
                const tPos = tp.mesh.position;
                const offsetDist = tp.baseRadius * (isRealisticScale ? 12 : 7);
                const angleOffset = tp.angle - 0.5;
                const desiredCamPos = new THREE.Vector3(
                    tPos.x + Math.cos(angleOffset) * offsetDist,
                    tPos.y + offsetDist * 0.4,
                    tPos.z + Math.sin(angleOffset) * offsetDist
                );
                camera.position.lerp(desiredCamPos, 0.04);
                controls.target.lerp(tPos, 0.08);
                camera.position.x += Math.sin(time * 0.5) * 0.005;
                camera.position.y += Math.cos(time * 0.3) * 0.005;
            }

            controls.update();
            composer.render();
        }

        animate();
    </script>
</body>
</html>
